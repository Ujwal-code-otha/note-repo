name: Selenium Web E2E Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  selenium-tests:
    name: Run Selenium Web Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: website/package.json

      - name: Install Website Dependencies
        working-directory: website
        run: npm ci

      - name: Start Web Server
        working-directory: website
        run: |
          npm run dev -- -H 127.0.0.1 > server.log 2>&1 &
          SERVER_PID=$!
          sleep 15
          if ! kill -0 $SERVER_PID 2>/dev/null; then
            echo "Server process died. Logs:"
            cat server.log
            exit 1
          fi

      - name: Wait for Web Server (Port 3000)
        run: npx wait-on tcp:127.0.0.1:3000 --timeout 120000 --verbose

      - name: Verify Server Health
        run: curl -fL http://127.0.0.1:3000 || exit 1

      - name: Additional Wait Buffer
        run: sleep 5

      - name: Run Selenium NodeJS Tests
        working-directory: website
        run: node tests/seleniumTest.js
        env:
          HEADLESS: 'true'
          TEST_EMAIL: 'shreyassatishkumar@gmail.com'
          TEST_PASSWORD: '123456'

      - name: Grant Execute Permission to Gradle Wrapper
        run: chmod +x gradlew

      - name: Run Selenium Kotlin Gradle Tests
        run: ./gradlew :selenium-automation:test
        env:
          TEST_EMAIL: 'shreyassatishkumar@gmail.com'
          TEST_PASSWORD: '123456'

      - name: Upload Server Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Web-Server-Log
          path: website/server.log
          retention-days: 7

      - name: Upload Selenium JS Excel Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Selenium-JS-Excel-Report
          path: website/reports/selenium-report_*.xlsx
          retention-days: 7

      - name: Upload Selenium Gradle Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Selenium-Gradle-Test-Reports
          path: selenium-automation/build/reports/tests/test/
          retention-days: 7


