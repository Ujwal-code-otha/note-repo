name: Selenium Web E2E Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  selenium-tests:
    name: Run Selenium Web Tests
    runs-on: self-hosted
    defaults:
      run:
        shell: powershell
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: website/package.json

      - name: Clean port 3000
        run: |
          $conn = Get-NetTCPConnection -LocalPort 3000 -ErrorAction SilentlyContinue
          if ($conn) {
              Write-Host "Stopping process on port 3000..."
              Stop-Process -Id $conn.OwningProcess -Force -ErrorAction SilentlyContinue
              Start-Sleep -Seconds 2
          }

      - name: Install Website Dependencies
        working-directory: website
        run: npm ci

      - name: Start Web Server
        run: |
          Start-Process npm -ArgumentList "run dev" -NoNewWindow -WorkingDirectory website
          Start-Sleep -Seconds 5

      - name: Wait for Web Server (Port 3000)
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Run Selenium NodeJS Tests
        working-directory: website
        run: node tests/seleniumTest.js
        env:
          HEADLESS: 'true'
          TEST_EMAIL: 'shreyassatishkumar@gmail.com'
          TEST_PASSWORD: '123456'

      - name: Run Selenium Kotlin Gradle Tests
        run: |
          .\gradlew.bat :selenium-automation:test
        env:
          TEST_EMAIL: 'shreyassatishkumar@gmail.com'
          TEST_PASSWORD: '123456'

      - name: Stop Web Server
        if: always()
        run: |
          $conn = Get-NetTCPConnection -LocalPort 3000 -ErrorAction SilentlyContinue
          if ($conn) {
              Stop-Process -Id $conn.OwningProcess -Force -ErrorAction SilentlyContinue
          }

      - name: Upload Selenium JS Excel Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Selenium-JS-Excel-Report
          path: website/reports/selenium-report_*.xlsx
          retention-days: 7

      - name: Upload Selenium Gradle Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Selenium-Gradle-Test-Reports
          path: selenium-automation/build/reports/tests/test/
          retention-days: 7

