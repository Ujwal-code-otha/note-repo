name: Load Performance Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  load-tests:
    name: Run Load and Performance Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: load-test-scripts/package.json

      - name: Set up Python for Excel Generation
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python Dependencies
        run: pip install openpyxl

      - name: Install Load Test Dependencies
        working-directory: load-test-scripts
        run: npm ci

      - name: Run Load Tests
        run: node load-test-scripts/run_perf_tests.js

      - name: Upload Load Performance Excel Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SmartNotes-Load-Performance-Report
          path: load-test-scripts/load-test-reports/Load_Test_Report.xlsx
          if-no-files-found: warn
          retention-days: 30
