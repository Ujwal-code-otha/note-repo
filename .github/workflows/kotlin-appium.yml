name: Kotlin Appium Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  appium-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Appium and Driver
        run: |
          npm install -g appium@latest
          appium driver install uiautomator2

      - name: Grant Execute Permission to Gradle Wrapper
        run: chmod +x gradlew

      - name: Build Android App (APK)
        run: ./gradlew assembleDebug

      - name: Run Appium Tests on Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu off -no-audio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            appium --log build/appium.log &
            ./gradlew :appium-automation:test

      - name: Upload Appium Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-test-reports
          path: |
            appium-automation/build/reports/
            appium-automation/build/allure-results/
            build/appium.log
          retention-days: 7
