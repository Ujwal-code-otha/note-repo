name: Appium Android E2E Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  appium-tests:
    name: Run Appium Android Tests
    runs-on: self-hosted
    defaults:
      run:
        shell: powershell
    env:
      ANDROID_HOME: "C:\\Users\\shrey\\AppData\\Local\\Android\\Sdk"
      ANDROID_SDK_ROOT: "C:\\Users\\shrey\\AppData\\Local\\Android\\Sdk"

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          clean: false

      # ── 2. Android SDK & local.properties ────────────────────────────────────
      - name: Configure Android SDK and local.properties
        run: |
          $sdkRoot = "C:\Users\shrey\AppData\Local\Android\Sdk"
          echo "ANDROID_HOME=$sdkRoot"   >> $env:GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$sdkRoot" >> $env:GITHUB_ENV
          echo "$sdkRoot\platform-tools" >> $env:GITHUB_PATH
          echo "$sdkRoot\emulator"       >> $env:GITHUB_PATH
          echo "$sdkRoot\tools\bin"      >> $env:GITHUB_PATH

          # Recreate local.properties (gitignored)
          $localProps = "sdk.dir=C:/Users/shrey/AppData/Local/Android/Sdk"
          Set-Content -Path local.properties -Value $localProps
          Write-Host "local.properties written: $localProps"

      # ── 3. Verify emulator connected ──────────────────────────────────────────
      - name: Verify Android Emulator
        run: |
          $adb = "C:\Users\shrey\AppData\Local\Android\Sdk\platform-tools\adb.exe"
          Write-Host "ADB Devices:"
          & $adb devices

      # ── 4. Java 17 (NO cache — avoids tar.exe space-in-path error) ───────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          # cache intentionally omitted — avoids Windows tar.exe failure on paths with spaces

      # ── 5. Node.js (NO cache) ─────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # cache intentionally omitted — avoids Windows tar.exe failure

      # ── 6. Start Appium ───────────────────────────────────────────────────────
      - name: Start Appium Server
        run: |
          $conn = Get-NetTCPConnection -LocalPort 4723 -ErrorAction SilentlyContinue
          if ($conn) {
              Write-Host "Stopping existing process on port 4723..."
              Stop-Process -Id $conn.OwningProcess -Force -ErrorAction SilentlyContinue
              Start-Sleep -Seconds 2
          }
          $appiumPath = (Get-Command appium -ErrorAction SilentlyContinue)
          if (-not $appiumPath) {
              Write-Host "Installing Appium..."
              npm install -g appium
          }
          Write-Host "Starting Appium on port 4723..."
          Start-Process powershell -ArgumentList "-NoProfile -Command appium --port 4723 --base-path '/'" -WindowStyle Hidden
          Start-Sleep -Seconds 15
          try {
              $status = Invoke-RestMethod -Uri "http://127.0.0.1:4723/status" -TimeoutSec 5
              Write-Host "[OK] Appium running"
          } catch {
              Write-Host "[WARN] Appium may still be initialising..."
          }

      # ── 7. Build APK ──────────────────────────────────────────────────────────
      - name: Build Debug APK
        run: |
          Write-Host "ANDROID_HOME = $env:ANDROID_HOME"
          Get-Content local.properties
          .\gradlew.bat :app:assembleDebug --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      # ── 8. Ensure report directory exists before tests ────────────────────────
      - name: Create Report Directory
        run: |
          $reportDir = "appium-automation\build\reports\appium"
          New-Item -ItemType Directory -Force -Path $reportDir
          Write-Host "Report dir ready: $reportDir"

      # ── 9. Install Appium JS deps ─────────────────────────────────────────────
      - name: Install Android Automation Dependencies
        working-directory: android_automation
        run: npm ci

      # ── 10. Run Appium JS Tests ───────────────────────────────────────────────
      - name: Run Appium NodeJS Tests
        working-directory: android_automation
        continue-on-error: true
        run: |
          $env:APPIUM_UDID             = "emulator-5554"
          $env:APPIUM_DEVICE_NAME      = "Android Emulator"
          $env:APPIUM_PLATFORM_VERSION = "11"
          node tests/appiumTest.js

      # ── 11. Run Kotlin 200-Test Suite ─────────────────────────────────────────
      - name: Run Appium Kotlin 200 Tests
        continue-on-error: true
        run: |
          Write-Host "Running SmartNotesAppiumTests (200 unique test cases)..."
          $env:APPIUM_UDID             = "emulator-5554"
          $env:APPIUM_DEVICE_NAME      = "Android Emulator"
          $env:APPIUM_PLATFORM_VERSION = "11"
          .\gradlew.bat :appium-automation:test --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      # ── 12. Stop Appium ───────────────────────────────────────────────────────
      - name: Stop Appium Server
        if: always()
        run: |
          $conn = Get-NetTCPConnection -LocalPort 4723 -ErrorAction SilentlyContinue
          if ($conn) {
              Write-Host "Stopping Appium..."
              Stop-Process -Id $conn.OwningProcess -Force -ErrorAction SilentlyContinue
          }

      # ── 13. List generated report files ──────────────────────────────────────
      - name: List Report Files
        if: always()
        run: |
          Write-Host "=== Contents of appium-automation/build/reports/appium/ ==="
          Get-ChildItem -Path "appium-automation\build\reports\appium\" -ErrorAction SilentlyContinue
          Write-Host "=== Contents of android_automation/reports/ ==="
          Get-ChildItem -Path "android_automation\reports\" -ErrorAction SilentlyContinue

      # ── 14. Upload Kotlin Excel Report ────────────────────────────────────────
      - name: Upload Kotlin Excel Report (200 Tests)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SmartNotes-Appium-Kotlin-200-Tests-Report
          path: appium-automation/build/reports/appium/*.xlsx
          if-no-files-found: warn
          retention-days: 30

      # ── 15. Upload JS Excel Report ────────────────────────────────────────────
      - name: Upload JS Appium Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SmartNotes-Appium-JS-Report
          path: android_automation/reports/android-appium-report_*.xlsx
          if-no-files-found: warn
          retention-days: 30

      # ── 16. Upload Screenshots ────────────────────────────────────────────────
      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Appium-Test-Screenshots
          path: android_automation/reports/screenshots/
          if-no-files-found: warn
          retention-days: 14

      # ── 17. Upload Kotlin HTML Test Report ────────────────────────────────────
      - name: Upload Kotlin HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Appium-Kotlin-HTML-Report
          path: appium-automation/build/reports/tests/test/
          if-no-files-found: warn
          retention-days: 14

      # ── 18. Job Summary ───────────────────────────────────────────────────────
      - name: Write Job Summary
        if: always()
        run: |
          echo "## Appium Android E2E Test Results" >> $env:GITHUB_STEP_SUMMARY
          echo "" >> $env:GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $env:GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $env:GITHUB_STEP_SUMMARY
          echo "| Kotlin Test Suite | SmartNotesAppiumTests |" >> $env:GITHUB_STEP_SUMMARY
          echo "| Total Test Cases | 200 |" >> $env:GITHUB_STEP_SUMMARY
          echo "| Report | Download from Artifacts above |" >> $env:GITHUB_STEP_SUMMARY
