name: Appium Android E2E Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  appium-tests:
    name: Run Appium Android Tests
    runs-on: self-hosted
    defaults:
      run:
        shell: powershell
    env:
      ANDROID_HOME: "C:\\Users\\shrey\\AppData\\Local\\Android\\Sdk"
      ANDROID_SDK_ROOT: "C:\\Users\\shrey\\AppData\\Local\\Android\\Sdk"
      JAVA_HOME: "C:\\Program Files\\Common Files\\Oracle\\Java\\javapath"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── Set Android SDK PATH & create local.properties ────────────────────────
      - name: Configure Android SDK & local.properties
        run: |
          # Add SDK tools to PATH for this job
          $sdkRoot = "C:\Users\shrey\AppData\Local\Android\Sdk"
          $env:PATH = "$sdkRoot\platform-tools;$sdkRoot\tools;$sdkRoot\tools\bin;$sdkRoot\emulator;$env:PATH"
          echo "ANDROID_HOME=$sdkRoot" >> $env:GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$sdkRoot" >> $env:GITHUB_ENV
          echo "$sdkRoot\platform-tools" >> $env:GITHUB_PATH
          echo "$sdkRoot\emulator"       >> $env:GITHUB_PATH
          echo "$sdkRoot\tools\bin"      >> $env:GITHUB_PATH

          # Create local.properties using forward slashes (Android SDK accepts both)
          $localProps = "sdk.dir=C:/Users/shrey/AppData/Local/Android/Sdk"
          Write-Host "Writing local.properties: $localProps"
          Set-Content -Path local.properties -Value $localProps
          Get-Content local.properties

      # ── Verify emulator is running ────────────────────────────────────────────
      - name: Verify Android Emulator is Running
        run: |
          $adb = "C:\Users\shrey\AppData\Local\Android\Sdk\platform-tools\adb.exe"
          Write-Host "Connected devices:"
          & $adb devices
          $devices = & $adb devices | Select-String "emulator"
          if (-not $devices) {
            Write-Host "[WARN] No emulator detected - tests will use mock driver"
          } else {
            Write-Host "[OK] Emulator found: $devices"
          }

      # ── Java & Node ───────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: android_automation/package.json

      # ── Start Appium ──────────────────────────────────────────────────────────
      - name: Start Appium Server
        run: |
          # Kill any process already on port 4723
          $conn = Get-NetTCPConnection -LocalPort 4723 -ErrorAction SilentlyContinue
          if ($conn) {
              Write-Host "Stopping existing process on port 4723..."
              Stop-Process -Id $conn.OwningProcess -Force -ErrorAction SilentlyContinue
              Start-Sleep -Seconds 2
          }

          # Install Appium if not present
          $appiumPath = (Get-Command appium -ErrorAction SilentlyContinue)
          if (-not $appiumPath) {
              Write-Host "Installing Appium..."
              npm install -g appium
          }

          Write-Host "Starting Appium Server in background..."
          Start-Process powershell -ArgumentList "-NoProfile -Command appium --port 4723 --base-path '/'" -WindowStyle Hidden
          Write-Host "Waiting for Appium to be ready..."
          Start-Sleep -Seconds 15

          # Confirm Appium is up
          try {
              $status = Invoke-RestMethod -Uri "http://127.0.0.1:4723/status" -TimeoutSec 5
              Write-Host "✅ Appium is running: $($status.value.ready)"
          } catch {
              Write-Host "⚠️  Appium may still be starting..."
          }

      # ── Build APK ─────────────────────────────────────────────────────────────
      - name: Build Debug APK
        run: |
          Write-Host "ANDROID_HOME = $env:ANDROID_HOME"
          Write-Host "JAVA_HOME    = $env:JAVA_HOME"
          Get-Content local.properties
          .\gradlew.bat :app:assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      # ── Install JS dependencies ───────────────────────────────────────────────
      - name: Install Android Automation Dependencies
        working-directory: android_automation
        run: npm ci

      # ── Run Appium JS Tests ───────────────────────────────────────────────────
      - name: Run Appium NodeJS Tests
        working-directory: android_automation
        run: |
          $env:APPIUM_UDID            = "emulator-5554"
          $env:APPIUM_DEVICE_NAME     = "Android Emulator"
          $env:APPIUM_PLATFORM_VERSION= "11"
          node tests/appiumTest.js

      # ── Run Kotlin Gradle Tests ───────────────────────────────────────────────
      - name: Run Appium Kotlin Gradle Tests
        run: |
          .\gradlew.bat :appium-automation:test --no-daemon
        continue-on-error: true

      # ── Stop Appium ───────────────────────────────────────────────────────────
      - name: Stop Appium Server
        if: always()
        run: |
          $conn = Get-NetTCPConnection -LocalPort 4723 -ErrorAction SilentlyContinue
          if ($conn) {
              Write-Host "Stopping Appium Server..."
              Stop-Process -Id $conn.OwningProcess -Force -ErrorAction SilentlyContinue
          }

      # ── Upload Reports ────────────────────────────────────────────────────────
      - name: Upload Appium JS Excel Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Appium-JS-Excel-Report
          path: android_automation/reports/android-appium-report_*.xlsx
          retention-days: 7

      - name: Upload Appium Gradle Excel Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Appium-Gradle-Excel-Report
          path: appium-automation/build/reports/appium/*.xlsx
          retention-days: 7

      - name: Upload Appium Gradle Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Appium-Gradle-Test-Reports
          path: appium-automation/build/reports/tests/test/
          retention-days: 7

      - name: Upload Test Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Appium-Screenshots
          path: android_automation/reports/screenshots/
          retention-days: 7
