name: E2E Tests (Web & Android)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  selenium-e2e:
    name: Selenium E2E Web Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install web dependencies
        working-directory: website
        run: npm install

      - name: Run Selenium E2E tests
        working-directory: website
        run: |
          npm run dev &
          # Wait for Next.js to start
          for i in {1..30}; do curl -s http://localhost:3000 && break || sleep 2; done
          HEADLESS=true npm test

      - name: Upload Selenium report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-test-report
          path: website/reports/selenium-report.xlsx

  appium-e2e:
    name: Appium E2E Android Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install Appium & UiAutomator2 Driver
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Install test runner dependencies
        working-directory: android_automation
        run: npm install

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Run Appium Tests on Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          force-avd-creation: true
          emulator-boot-timeout: 600
          emulator-options: -no-snapshot-load -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            echo "Waiting for emulator to be online via adb..."
            adb wait-for-device
            
            echo "Checking sys.boot_completed..."
            boot_completed=""
            while [ "$boot_completed" != "1" ]; do
              boot_completed=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r\n')
              if [ "$boot_completed" != "1" ]; then
                echo "Still booting (sys.boot_completed=$boot_completed)..."
                sleep 5
              fi
            done
            echo "Emulator is fully booted!"
            
            echo "Starting Appium server..."
            appium --log appium.log &
            
            echo "Waiting for Appium server to start..."
            for i in {1..30}; do
              if nc -z localhost 4723 || curl -s http://localhost:4723/status > /dev/null; then
                echo "Appium server is up and running!"
                break
              fi
              sleep 2
            done
            
            cd android_automation
            npm test

      - name: Upload Appium server log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-log
          path: appium.log

      - name: Upload Appium report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-appium-report
          path: |
            android_automation/reports/*.xlsx
            android_automation/reports/screenshots/*.png
